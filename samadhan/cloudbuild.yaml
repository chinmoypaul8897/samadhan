# Build the Next.js image with NEXT_PUBLIC_* inlined as Docker --build-arg, push to
# Artifact Registry, and deploy to Cloud Run — in one build. `gcloud run deploy
# --source` has NO --build-arg, so an explicit Cloud Build is required (C2b).
# NEXT_PUBLIC_* are public client config (shipped in the browser bundle by design),
# so passing them as substitutions is fine — not a secret leak.
#
# Run from samadhan/:
#   gcloud builds submit --project=samadhan-civic-7k4m2 --region=asia-south1 \
#     --config=cloudbuild.yaml \
#     --substitutions=_NEXT_PUBLIC_FIREBASE_API_KEY="…",_NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN="…",… .

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/samadhan/samadhan-web:$BUILD_ID'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_API_KEY=${_NEXT_PUBLIC_FIREBASE_API_KEY}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${_NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_NEXT_PUBLIC_FIREBASE_PROJECT_ID}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${_NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${_NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_APP_ID=${_NEXT_PUBLIC_FIREBASE_APP_ID}'
      - '--build-arg'
      - 'NEXT_PUBLIC_MAPS_BROWSER_KEY=${_NEXT_PUBLIC_MAPS_BROWSER_KEY}'
      - '--build-arg'
      - 'NEXT_PUBLIC_VAPID_PUBLIC_KEY=${_NEXT_PUBLIC_VAPID_PUBLIC_KEY}'
      - '.'
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/samadhan/samadhan-web:$BUILD_ID'
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - samadhan
      - '--image'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/samadhan/samadhan-web:$BUILD_ID'
      - '--region'
      - 'asia-south1'
      - '--platform'
      - 'managed'
      - '--quiet'

images:
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/samadhan/samadhan-web:$BUILD_ID'

substitutions:
  _NEXT_PUBLIC_FIREBASE_API_KEY: ''
  _NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ''
  _NEXT_PUBLIC_FIREBASE_PROJECT_ID: ''
  _NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ''
  _NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ''
  _NEXT_PUBLIC_FIREBASE_APP_ID: ''
  _NEXT_PUBLIC_MAPS_BROWSER_KEY: ''
  _NEXT_PUBLIC_VAPID_PUBLIC_KEY: ''

options:
  logging: CLOUD_LOGGING_ONLY
